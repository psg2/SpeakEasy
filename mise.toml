[tools]
pkl = "latest"
hk = "latest"
typos = "latest"
swiftlint = "latest"
"asdf:swiftformat" = "latest"

[settings]
activate_aggressive = true

[tasks.build]
description = "Build the OpenVoicy application"
run = "xcodebuild -project OpenVoicy.xcodeproj -scheme OpenVoicy -configuration Debug build CODE_SIGN_IDENTITY=\"\" CODE_SIGNING_REQUIRED=NO"
alias = "b"

[tasks.open]
description = "Open the built OpenVoicy application"
run = "open /Users/arado/Library/Developer/Xcode/DerivedData/OpenVoicy-ckkkjzkfjvlqatfgihmivypagacj/Build/Products/Debug/OpenVoicy.app"
alias = "o"

[tasks.format]
description = "Format the code using swiftformat"
run = "swiftformat ."
alias = "fmt"

[tasks.lint]
description = "Lint the code using swiftlint"
run = "swiftlint"
alias = "lint"

[tasks.dev]
description = "Compile and run the application"
run = "./scripts/compile_and_run.sh"
