[tools]
pkl = "latest"
hk = "latest"
typos = "latest"
swiftlint = "latest"
actionlint = "latest"
ghalint = "latest"
"asdf:swiftformat" = "latest"

[settings]
activate_aggressive = true

[tasks.build]
description = "Build the SpeakEasy application"
run = "xcodebuild -project SpeakEasy.xcodeproj -scheme SpeakEasy -configuration Debug build CODE_SIGN_IDENTITY=\"\" CODE_SIGNING_REQUIRED=NO"
alias = "b"

[tasks.open]
description = "Open the built SpeakEasy application"
run = "open /Users/arado/Library/Developer/Xcode/DerivedData/SpeakEasy-ckkkjzkfjvlqatfgihmivypagacj/Build/Products/Debug/SpeakEasy.app"
alias = "o"

[tasks.format]
description = "Format the code using swiftformat"
run = "swiftformat ."
alias = "fmt"

[tasks.lint]
description = "Lint the code using swiftlint"
run = "swiftlint"
alias = "lint"

[tasks.test]
description = "Run Swift tests"
run = "swift test"
alias = "t"

[tasks.dev]
description = "Compile and run the application"
run = "./scripts/compile_and_run.sh"
